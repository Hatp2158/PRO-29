name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A55E94: ${{ secrets.A55E94 }}
          B8E62B: ${{ secrets.B8E62B }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A55E94', '')
          bm = os.environ.get('B8E62B', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 03a782254fb73ca01133d3a742af27876649f6044b2c -->', gm)
              s2 = s2.replace('<!-- e689a07df0c4419c285af6b53a1c3ceb28f9d6a97919 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
